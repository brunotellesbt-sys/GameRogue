<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POKELIKE - GitHub Pages Edition</title>
  <meta name="description" content="Pokémon-style roguelike autobattler feito em HTML, CSS e JS para GitHub Pages." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Pokemon Roguelike</p>
        <h1>POKELIKE</h1>
        <p class="version">v1.5.1 — GitHub Pages Edition</p>
      </div>
      <div class="top-actions">
        <button id="continueRunBtn" class="ghost">Continue Run</button>
        <button id="continueTowerBtn" class="ghost">Continue Battle Tower</button>
      </div>
    </header>

    <main id="app"></main>

    <footer>
      <span>Fan-made project. Not affiliated with, endorsed by, or sponsored by Nintendo, Game Freak, or The Pokémon Company.</span>
      <span>Sprites are loaded from public PokéAPI/GitHub sprite mirrors at runtime.</span>
    </footer>
  </div>

  <template id="pokemon-card-template">
    <article class="poke-card">
      <div class="sprite-wrap"><img alt="" loading="lazy" /></div>
      <div class="poke-meta">
        <h3></h3>
        <p class="small"></p>
        <div class="type-row"></div>
        <div class="hpbar"><span></span></div>
        <p class="stats"></p>
      </div>
    </article>
  </template>

  <script src="game.js"></script>
</body>
</html>
